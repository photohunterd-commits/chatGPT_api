name: Build Installer And Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Determine version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $appVersion = "${{ github.ref_name }}"
            if ($appVersion.StartsWith("v")) {
              $appVersion = $appVersion.Substring(1)
            }

            "APP_VERSION=$appVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          else {
            "APP_VERSION=0.0.${{ github.run_number }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Install dependencies
        run: npm ci

      - name: Package VS Code extension
        run: npm run package --workspace apps/vscode-codex

      - name: Publish desktop app
        run: npm run publish:desktop

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/build-installer.ps1 -Version $env:APP_VERSION

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          path: |
            publish/installer/*.exe
            apps/vscode-codex/*.vsix

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            publish/installer/*.exe
            apps/vscode-codex/*.vsix
